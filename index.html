<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advocate Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#071a3d;
  --gold:#c9a84c;
  --gold-light:#f0d080;
  --cream:#faf8f3;
  --surface:#ffffff;
  --text:#1a1a2e;
  --muted:#6b7280;
  --border:#e5e7eb;
  --danger:#dc2626;
  --success:#16a34a;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* AUTH */
.auth-screen{
  min-height:100vh;
  display:flex;
  background:linear-gradient(135deg,var(--navy) 0%,#0f2d5e 50%,#16336b 100%);
}
.auth-left{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px;
  color:white;
}
.auth-left h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,5vw,64px);
  font-weight:600;
  line-height:1.1;
  margin-bottom:20px;
}
.auth-left h1 span{color:var(--gold)}
.auth-left p{font-size:16px;opacity:0.7;max-width:360px;line-height:1.7}

.auth-right{
  width:460px;
  background:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:60px 48px;
}

.field{margin-bottom:16px}
.field input{
  width:100%;
  padding:12px 16px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font-size:15px;
  outline:none;
}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.btn-primary{background:var(--navy);color:white}
.btn-danger{background:var(--danger);color:white;width:auto;padding:8px 16px;font-size:13px}
.btn-gold{background:var(--gold);color:var(--navy)}

.msg{
  padding:10px 14px;
  border-radius:6px;
  font-size:13px;
  margin-top:12px;
  display:none;
}
.msg.show{display:block}
.msg.error{background:#fef2f2;color:#991b1b}
.msg.success{background:#f0fdf4;color:#166534}
.msg.info{background:#eff6ff;color:#1e40af}

/* APP */
#app{display:none;min-height:100vh}

.topbar{
  background:var(--navy);
  padding:0 32px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:white;
}

.main-content{
  max-width:1100px;
  margin:auto;
  padding:32px 24px;
  display:grid;
  grid-template-columns:1fr 320px;
  gap:24px;
}

.card{
  background:white;
  border-radius:12px;
  padding:24px;
  border:1px solid var(--border);
}

.cases-list{display:flex;flex-direction:column;gap:10px}

.case-card{
  padding:14px;
  border:1px solid var(--border);
  border-radius:10px;
}

.case-badge{
  padding:4px 10px;
  border-radius:100px;
  font-size:12px;
}

.badge-active{background:#dcfce7;color:#166534}
.badge-pending{background:#fef9c3;color:#854d0e}
.badge-closed{background:#f1f5f9;color:#475569}

.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.stat-box{
  padding:16px;
  text-align:center;
  border:1px solid var(--border);
  border-radius:10px;
}

.stat-num{font-size:28px;font-weight:600}

</style>
</head>

<body>

<!-- AUTH -->
<div class="auth-screen" id="authBox">
  <div class="auth-left">
    <h1>Manage your<br>practice with <span>clarity.</span></h1>
  </div>

  <div class="auth-right">

    <h2>Login / Signup</h2>

    <div class="field">
      <input id="email" placeholder="Email">
    </div>

    <div class="field">
      <input id="password" type="password" placeholder="Password">
    </div>

    <button class="btn btn-primary" onclick="signup()">Signup</button>
    <button class="btn btn-primary" onclick="login()">Login</button>

    <div class="msg" id="msg"></div>

  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="topbar">
    <h3>LexDesk</h3>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <div class="main-content">

    <div class="card">
      <h3>Add Case</h3>

      <input id="name" placeholder="Client Name">
      <input id="caseType" placeholder="Case Type">
      <input id="status" placeholder="Status">

      <button class="btn btn-gold" onclick="insertCase()">Add</button>

      <h3>Your Cases</h3>
      <div id="cases"></div>
    </div>

    <div class="card">
      <h3>Overview</h3>
      <canvas id="caseChart"></canvas>
    </div>

  </div>
</div>

<script>

const SUPABASE_URL = "https://icubannrfuawithpnxil.supabase.co";
const SUPABASE_KEY = "YOUR_KEY_HERE";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* MESSAGE */
function showMsg(text,type='error'){
  const el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg show '+type;
}

/* ✅ SIGNUP (ALLOWLIST REMOVED COMPLETELY) */
async function signup(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;

  if(!email||!password){
    showMsg("Fill all fields");
    return;
  }

  const {error}=await sb.auth.signUp({
    email,
    password
  });

  if(error){
    showMsg(error.message);
    return;
  }

  showMsg("Signup successful! Check email confirmation","success");
}

/* LOGIN */
async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;

  const {data,error}=await sb.auth.signInWithPassword({
    email,password
  });

  if(error){
    showMsg(error.message);
    return;
  }

  document.getElementById('authBox').style.display='none';
  document.getElementById('app').style.display='block';

  loadCases();
}

/* LOGOUT */
async function logout(){
  await sb.auth.signOut();
  location.reload();
}

/* INSERT CASE */
async function insertCase(){

  const {data:user}=await sb.auth.getUser();

  const name=document.getElementById('name').value;
  const caseType=document.getElementById('caseType').value;
  const status=document.getElementById('status').value;

  await sb.from('clients').insert([{
    name,
    case_type:caseType,
    status,
    user_id:user.user.id
  }]);

  loadCases();
}

/* LOAD CASES */
async function loadCases(){

  const {data:user}=await sb.auth.getUser();

  const {data}=await sb.from('clients')
    .select('*')
    .eq('user_id',user.user.id);

  const box=document.getElementById('cases');
  box.innerHTML="";

  let active=0,pending=0,closed=0;

  data.forEach(c=>{

    if(c.status==='Active') active++;
    else if(c.status==='Pending') pending++;
    else closed++;

    box.innerHTML+=`
      <div class="case-card">
        <b>${c.name}</b><br>
        ${c.case_type} - ${c.status}
      </div>
    `;
  });

  renderChart(active,pending,closed);
}

/* CHART */
function renderChart(a,p,c){

  new Chart(document.getElementById('caseChart'),{
    type:'doughnut',
    data:{
      labels:['Active','Pending','Closed'],
      datasets:[{
        data:[a,p,c],
        backgroundColor:['#16a34a','#d97706','#94a3b8']
      }]
    }
  });
}

/* AUTO SESSION */
sb.auth.getSession().then(({data})=>{
  if(data.session){
    document.getElementById('authBox').style.display='none';
    document.getElementById('app').style.display='block';
    loadCases();
  }
});

</script>

</body>
</html>
